[build]
  command = "npm run build"
  publish = "dist"

# Handle Single Page Application routing for the main app
[[redirects]]
  from = "/p/*"
  to = "/index.html"
  status = 200

# Handle the Admin panel route
[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200

# Catch-all fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
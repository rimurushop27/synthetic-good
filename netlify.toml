
[build]
  command = "npm run build"
  publish = "dist"

# Rule 1: Handle /p/* specifically for post details
[[redirects]]
  from = "/p/*"
  to = "/index.html"
  status = 200

# Rule 2: Handle Admin panel
[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200

# Rule 3: Catch-all for React Router / SPA
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
